<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delete Account - Genetics Mobile Application</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #eef2f7, #dbeafe);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        padding: 40px;
        border-radius: 12px;
        width: 400px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        text-align: center;
    }

    h1 {
        color: #2563eb;
        margin-bottom: 10px;
    }

    p {
        color: #6b7280;
        font-size: 14px;
        margin-bottom: 25px;
    }

    input, textarea {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 14px;
    }

    textarea {
        resize: none;
        height: 80px;
    }

    button {
        width: 100%;
        padding: 14px;
        background: #ef4444;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        background: #dc2626;
    }

    .footer {
        margin-top: 15px;
        font-size: 12px;
        color: #9ca3af;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Delete Your Genetics App Account</h1>

    <p>
        We're sorry to see you go. Please submit this form to request permanent deletion of your account.
    </p>

    <form>
        <input type="text" placeholder="Enter your full name" required>
        <input type="email" placeholder="Enter your registered email" required>
        <input type="tel" placeholder="Registered phone number" required>
        <textarea placeholder="Reason for leaving (optional)"></textarea>

        <button type="submit">Delete My Account</button>
    </form>

    <div class="footer">
        © 2026 Genetics Mobile Application
    </div>
</div>

</body>
</html>
